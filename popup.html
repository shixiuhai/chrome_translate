<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>翻译插件</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --text-secondary: #666666;
      --border-color: #eeeeee;
      --input-bg: #ffffff;
      --button-bg: #4285f4;
      --button-hover: #3367d6;
      --secondary-button-bg: #f0f0f0;
      --secondary-button-hover: #e0e0e0;
      --result-bg: #f8f9fa;
      --error-bg: #fce8e6;
      --error-color: #c5221f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1e1e1e;
        --text-color: #ffffff;
        --text-secondary: #999999;
        --border-color: #333333;
        --input-bg: #2d2d2d;
        --button-bg: #4285f4;
        --button-hover: #3367d6;
        --secondary-button-bg: #333333;
        --secondary-button-hover: #444444;
        --result-bg: #2d2d2d;
        --error-bg: #4a2725;
        --error-color: #f28b82;
      }
    }

    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color);
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-color);
    }
    .settings-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
      border-radius: 4px;
      transition: background-color 0.2s;
      color: var(--text-color);
    }
    .settings-btn:hover {
      background-color: var(--secondary-button-bg);
    }
    .language-selectors {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .language-selector {
      flex: 1;
    }
    .language-selector label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .language-selector select {
      width: 100%;
      padding: 6px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 13px;
      background-color: var(--input-bg);
      color: var(--text-color);
    }
    .swap-btn {
      align-self: flex-end;
      background: none;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 1px;
      transition: all 0.2s;
      color: var(--text-color);
    }
    .swap-btn:hover {
      background-color: var(--secondary-button-bg);
      border-color: var(--border-color);
    }
    .input-area {
      margin-bottom: 15px;
    }
    .input-area textarea {
      width: 100%;
      min-height: 80px;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 14px;
      resize: vertical;
      box-sizing: border-box;
      font-family: inherit;
      background-color: var(--input-bg);
      color: var(--text-color);
    }
    .input-area textarea:focus {
      outline: none;
      border-color: #4285f4;
      box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
    }
    .translate-btn {
      width: 100%;
      padding: 10px;
      background-color: var(--button-bg);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 15px;
      transition: background-color 0.2s;
    }
    .translate-btn:hover {
      background-color: var(--button-hover);
    }
    .translate-btn:disabled {
      background-color: #90baf9;
      cursor: not-allowed;
    }
    .result-area {
      background-color: var(--result-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 10px;
      min-height: 60px;
      margin-bottom: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.5;
    }
    .result-area:empty::before {
      content: '翻译结果将显示在这里';
      color: #999;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .action-btn {
      flex: 1;
      padding: 8px;
      background-color: var(--secondary-button-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background-color: var(--secondary-button-hover);
    }
    .loading {
      text-align: center;
      padding: 10px;
      color: var(--text-secondary);
      display: none;
      font-size: 14px;
    }
    .error {
      background-color: var(--error-bg);
      color: var(--error-color);
      padding: 10px;
      border-radius: 4px;
      display: none;
      font-size: 13px;
      line-height: 1.5;
    }
    .result-area {
      max-height: 200px;
      overflow-y: auto;
    }

    /* 开关样式 */
    .toggle-group {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
      transition: all 0.2s ease;
      margin: 8px 0;
    }

    .toggle-group:hover {
      border-color: var(--button-bg);
    }

    .toggle-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      margin: 0;
    }

    .toggle-text {
      font-weight: 500;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 22px;
    }

    .toggle-input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 22px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    .toggle-input:checked + .toggle-slider {
      background-color: var(--button-bg);
    }

    .toggle-input:focus + .toggle-slider {
      box-shadow: 0 0 1px var(--button-bg);
    }

    .toggle-input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }
    .loading {
      text-align: center;
      padding: 10px;
      color: var(--text-secondary);
      display: none;
    }
    .error {
      color: var(--error-color);
      background-color: var(--error-bg);
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 10px;
      display: none;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">LibreTranslate 翻译</div>
    <button class="settings-btn" id="settingsBtn" title="打开设置">⚙️</button>
  </div>

  <div class="language-selectors">
    <div class="language-selector">
      <label>源语言</label>
      <select id="sourceLang">
        <option value="auto">自动检测</option>
      </select>
    </div>
    <button class="swap-btn" id="swapBtn" title="交换语言">⇄</button>
    <div class="language-selector">
      <label>目标语言</label>
      <select id="targetLang">
        <option value="zh-Hans">中文（简体）</option>
        <option value="zh-Hant">中文（繁体）</option>
        <option value="ar">阿拉伯语</option>
        <option value="az">阿塞拜疆语</option>
        <option value="bg">保加利亚语</option>
        <option value="bn">孟加拉语</option>
        <option value="ca">加泰罗尼亚语</option>
        <option value="cs">捷克语</option>
        <option value="da">丹麦语</option>
        <option value="de">德语</option>
        <option value="el">希腊语</option>
        <option value="en">英语</option>
        <option value="eo">世界语</option>
        <option value="es">西班牙语</option>
        <option value="et">爱沙尼亚语</option>
        <option value="eu">巴斯克语</option>
        <option value="fa">波斯语</option>
        <option value="fi">芬兰语</option>
        <option value="fr">法语</option>
        <option value="ga">爱尔兰语</option>
        <option value="gl">加利西亚语</option>
        <option value="he">希伯来语</option>
        <option value="hi">印地语</option>
        <option value="hu">匈牙利语</option>
        <option value="id">印度尼西亚语</option>
        <option value="it">意大利语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="ky">吉尔吉斯语</option>
        <option value="lt">立陶宛语</option>
        <option value="lv">拉脱维亚语</option>
        <option value="ms">马来语</option>
        <option value="nb">挪威语</option>
        <option value="nl">荷兰语</option>
        <option value="pl">波兰语</option>
        <option value="pt-BR">葡萄牙语（巴西）</option>
        <option value="pt">葡萄牙语</option>
        <option value="ro">罗马尼亚语</option>
        <option value="ru">俄语</option>
        <option value="sk">斯洛伐克语</option>
        <option value="sl">斯洛文尼亚语</option>
        <option value="sq">阿尔巴尼亚语</option>
        <option value="sr">塞尔维亚语</option>
        <option value="sv">瑞典语</option>
        <option value="th">泰语</option>
        <option value="tl">他加禄语</option>
        <option value="tr">土耳其语</option>
        <option value="uk">乌克兰语</option>
        <option value="ur">乌尔都语</option>
        <option value="vi">越南语</option>
      </select>
    </div>
  </div>

  <div class="input-area">
    <textarea id="sourceText" placeholder="请输入要翻译的文本..."></textarea>
  </div>

  <button class="translate-btn" id="translateBtn">翻译</button>

  <div class="loading" id="loading">翻译中...</div>
  <div class="error" id="error"></div>

  <div class="result-area" id="resultArea"></div>

  <div class="toggle-group">
    <label class="toggle-label">
      <span class="toggle-text">启用自动翻译</span>
      <div class="toggle-switch">
        <input type="checkbox" id="autoTranslate" class="toggle-input">
        <span class="toggle-slider"></span>
      </div>
    </label>
  </div>

  <div class="toggle-group">
    <label class="toggle-label">
      <span class="toggle-text">排除当前网站</span>
      <div class="toggle-switch">
        <input type="checkbox" id="excludeSite" class="toggle-input">
        <span class="toggle-slider"></span>
      </div>
    </label>
  </div>

  <div class="action-buttons">
    <button class="action-btn" id="translatePageBtn">翻译整个页面</button>
    <button class="action-btn" id="restorePageBtn">还原原文</button>
    <button class="action-btn" id="copyBtn">复制结果</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
